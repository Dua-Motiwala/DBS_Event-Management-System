{% extends "base.html" %}

{% block title %}Give Feedback - UniEvents{% endblock %}

{% block content %}
<div class="form-container">
    <h2 style="text-align: center; margin-bottom: 30px;">Your Feedback</h2>
    <p style="text-align: center; color: #666; margin-bottom: 20px;">We value your thoughts on the event.</p>
    <form method="POST">
        <div class="form-group">
            <label for="rating">Rating (1-5)</label>
            <select id="rating" name="rating" required>
                <option value="5">5 - Excellent</option>
                <option value="4">4 - Very Good</option>
                <option value="3">3 - Good</option>
                <option value="2">2 - Fair</option>
                <option value="1">1 - Poor</option>
            </select>
        </div>
        <div class="form-group">
            <label for="feedback_text">Comments</label>
            <textarea id="feedback_text" name="feedback_text" rows="5" required placeholder="What did you like? What can we improve?"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">Submit Feedback</button>
    </form>
</div>
{% endblock %}
