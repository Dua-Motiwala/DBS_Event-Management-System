{% extends "base.html" %}

{% block title %}Create Event - Organizer{% endblock %}

{% block content %}
<div class="form-container">
    <h2 style="text-align: center; margin-bottom: 30px;">Create New Event</h2>
    <form method="POST">
        <div class="form-group">
            <label for="title">Event Title</label>
            <input type="text" id="title" name="title" required placeholder="e.g. Tech Conference 2026">
        </div>
        <div class="form-group">
            <label for="date">Event Date</label>
            <input type="date" id="date" name="date" required>
        </div>
        <div class="form-group">
            <label for="venue">Venue</label>
            <select id="venue" name="venue">
                {% for venue in venues %}
                <option value="{{ venue.venueid }}">{{ venue.name }} (Cap: {{ venue.capacity }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category">
                {% for cat in categories %}
                <option value="{{ cat.categoryid }}">{{ cat.categoryname }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">Publish Event</button>
    </form>
</div>
{% endblock %}
