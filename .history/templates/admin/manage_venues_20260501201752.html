{% extends "base.html" %}

{% block title %}Manage Venues - Admin{% endblock %}

{% block content %}
<div style="margin-top: 40px;">
    <h2>Manage Venues</h2>
    
    <div class="form-container" style="max-width: 600px; margin: 30px 0;">
        <h3>Add New Venue</h3>
        <form method="POST">
            <div class="form-group">
                <label for="name">Venue Name</label>
                <input type="text" id="name" name="name" required placeholder="e.g. Grand Auditorium">
            </div>
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" required placeholder="e.g. Building B, 2nd Floor">
            </div>
            <div class="form-group">
                <label for="capacity">Capacity</label>
                <input type="number" id="capacity" name="capacity" required placeholder="e.g. 500">
            </div>
            <button type="submit" class="btn btn-primary">Add Venue</button>
        </form>
    </div>

    <table style="width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; box-shadow: var(--shadow);">
        <thead style="background: var(--primary-color); color: white;">
            <tr>
                <th style="padding: 15px; text-align: left;">ID</th>
                <th style="padding: 15px; text-align: left;">Name</th>
                <th style="padding: 15px; text-align: left;">Location</th>
                <th style="padding: 15px; text-align: left;">Capacity</th>
                <th style="padding: 15px; text-align: left;">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for venue in venues %}
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 15px;">{{ venue.venueid }}</td>
                <td style="padding: 15px;">{{ venue.name }}</td>
                <td style="padding: 15px;">{{ venue.location }}</td>
                <td style="padding: 15px;">{{ venue.capacity }}</td>
                <td style="padding: 15px;">
                    <form action="{{ url_for('admin.delete_venue', venue_id=venue.venueid) }}" method="POST" onsubmit="confirmAction(event, 'Delete Venue', 'Are you sure you want to delete this venue?', 'Delete Venue', '#e53e3e')">
                        <button type="submit" class="btn btn-outline" style="color: #e53e3e; border-color: #e53e3e; padding: 5px 10px; font-size: 0.8rem;">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
