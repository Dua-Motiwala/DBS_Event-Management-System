{% extends "base.html" %}

{% block title %}Manage Categories - Admin{% endblock %}

{% block content %}
<div style="margin-top: 40px;">
    <h2>Manage Event Categories</h2>
    
    <div class="form-container" style="max-width: 500px; margin: 30px 0;">
        <h3>Add New Category</h3>
        <form method="POST">
            <div class="form-group">
                <label for="name">Category Name</label>
                <input type="text" id="name" name="name" required placeholder="e.g. Workshop">
            </div>
            <button type="submit" class="btn btn-primary">Add Category</button>
        </form>
    </div>

    <table style="width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; box-shadow: var(--shadow);">
        <thead style="background: var(--primary-color); color: white;">
            <tr>
                <th style="padding: 15px; text-align: left;">ID</th>
                <th style="padding: 15px; text-align: left;">Category Name</th>
            </tr>
        </thead>
        <tbody>
            {% for cat in categories %}
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 15px;">{{ cat.categoryid }}</td>
                <td style="padding: 15px;">{{ cat.categoryname }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
