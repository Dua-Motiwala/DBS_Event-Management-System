{% extends "base.html" %}

{% block title %}Register - UniEvents{% endblock %}

{% block content %}
<div class="form-container">
    <h2 style="text-align: center; margin-bottom: 30px;">Create Your Account</h2>
    <form method="POST">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="john.doe@university.edu">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Minimum 8 characters">
        </div>
        <div class="form-group">
            <label for="role">Account Type</label>
            <select id="role" name="role">
                <option value="Attendee">Attendee (Student/Participant)</option>
                <option value="Organizer">Organizer (Faculty/Club Lead)</option>
                <option value="Admin">Administrator</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">Register</button>
    </form>
    <div style="margin-top: 20px; text-align: center;">
        <p>Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--secondary-color); font-weight: 600;">Sign In</a></p>
    </div>
</div>
{% endblock %}
