{% extends "base.html" %}

{% block title %}Login - UniEvents{% endblock %}

{% block content %}
<div class="form-container">
    <h2 style="text-align: center; margin-bottom: 30px;">Welcome Back</h2>
    <form method="POST">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="name@university.edu">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">Sign In</button>
    </form>
    <div style="margin-top: 20px; text-align: center;">
        <p>Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--secondary-color); font-weight: 600;">Register here</a></p>
        <p style="margin-top: 10px;"><a href="{{ url_for('auth.forgot_password') }}" style="font-size: 0.9rem;">Forgot Password?</a></p>
    </div>
</div>
{% endblock %}
